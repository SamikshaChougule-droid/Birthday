<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Arpita...!!! 🎉💖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="music-control">
        <button class="music-btn" onclick="toggleMusic()">
            <i class="fas fa-music"></i> Party Music
        </button>
        <audio id="birthdayMusic" loop preload="auto">
            <source src="birthday.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="container">
        <h1 class="hero-title">
            Happy Birthday<br>
            <span style="font-size: 0.65em; display: block;">[YOUR BEST FRIEND'S NAME]!</span>
        </h1>
        
        <p class="subtitle">
            🎉 Today the world got even more fabulous because YOU were born! 🎉
        </p>

        <div style="font-size: 5rem; margin: 40px 0; animation: bounce 2s infinite;">
            <i class="fas fa-birthday-cake"></i> 🎂 <i class="fas fa-gift"></i>
        </div>

        <div class="btn-grid">
            <a href="page2.html" class="btn">
                <i class="fas fa-heart"></i> Love Letter
            </a>
            <a href="page3.html" class="btn btn-secondary">
                <i class="fas fa-images"></i> Photo Memories
            </a>
            <a href="page4.html" class="btn">
                <i class="fas fa-star"></i> Birthday Wish
            </a>
        </div>

        <footer>
            <p>Made with <i class="fas fa-heart" style="color: var(--hot-pink);"></i> by your bestie!</p>
        </footer>
    </div>

    <div class="page-nav">
        <button class="nav-btn nav-home" onclick="window.location.href='index.html'">
            <i class="fas fa-home"></i>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
