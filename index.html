<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Arpita! 🎉💖✨</title>

    <link rel="stylesheet" href="./style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Floating Effect -->
    <div class="floating-magic" id="floatingMagic"></div>

    <!-- 🎵 MUSIC -->
    <div class="music-glitter">
        <button class="music-btn" onclick="toggleMusic()">
            <i class="fas fa-music"></i> 🎵 Party Started!
        </button>

        <audio id="birthdayMusic" loop>
            <source src="./birthday.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="container">

        <!-- 🎉 TITLE -->
        <h1 class="hero-title">
            Happy Birthday<br>
            <span class="arpita-name">ARPITA</span>
        </h1>

        <p class="subtitle">
            🎉 My soul sister, my sparkle, my EVERYTHING! 🥳💖
        </p>

        <!-- 🎀 MAIN BOX -->
        <div class="cute-box">
            <div class="big-emoji">
                🎂✨💖
            </div>

            <p class="main-text">
                Just for you 💌✨ Explore your special surprises!
            </p>
        </div>

        <!-- 🚀 ONLY 2 BUTTONS -->
        <div class="btn-grid">

            <!-- 💌 LOVE LETTER -->
            <a href="./page2.html" class="btn">
                <i class="fas fa-heart"></i><br>Love Letter 💌
            </a>

            <!-- 📸 PHOTOS -->
            <a href="./page3.html" class="btn btn-gold">
                <i class="fas fa-camera"></i><br>Photos 📸
            </a>

        </div>

        <footer>
            <p>Made with ❤️ for Arpita 🥰</p>
        </footer>

    </div>

    <script src="./script.js"></script>

</body>
</html>
